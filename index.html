// ── NORMALIZATION CONSTANTS ──────────────────────────────────────────────
// Win probs are independent estimates; these scale them so total EV = actual pot.
// Derived from: sum(all team r1 probs)=34.42 should be 32, etc.
const NORM = {
  r1:    32 / 34.42,
  r2:    16 / 19.34,
  s16:   8  / 10.76,
  e8:    4  / 6.48,
  f4:    2  / 3.59,
  champ: 1  / 1.70,
};

function calcEV(team, pot) {
  const p = pot || POT_BASE;
  const roundEV =
    team.r1    * NORM.r1    * p*0.010 +
    team.r2    * NORM.r2    * p*0.016 +
    team.s16   * NORM.s16   * p*0.020 +
    team.e8    * NORM.e8    * p*0.028 +
    team.f4    * NORM.f4    * p*0.035 +
    team.champ * NORM.champ * p*0.042;
  const bonusEV =
    (team.upsetProb   || 0) * p*0.020 +
    (team.blowoutProb || 0) * p*0.020;
  return Math.round(roundEV + bonusEV);
}

  const adjustedTeams = useMemo(() => {

      seedSales[seed].ratios.push(s.price / hist.avg);

    });
    let roomTemp = 1.0;
    const allRatios = Object.values(seedSales).flatMap(d => d.ratios);
    if (allRatios.length >= 3) {
      roomTemp = allRatios.reduce((a, b) => a + b, 0) / allRatios.length;
    }
    const getAdjustedMultiplier = (seed) => {
      if (seedSales[seed]?.ratios.length > 0) {
        const r = seedSales[seed].ratios;
        return r.reduce((a,b) => a+b, 0) / r.length;
      }
      const highVarianceSeeds = new Set([1, 2, 3, 7, 8]);

        const priceRatio = ev / blendedMid;

        const roiMultiplier = 1 + (histROI / 100) * 0.5;

        else                         newRating = "AVOID";
        adj.rating = newRating;  // always derived from valueScore
        return { ...adj, ev, valueScore };
      });

  const handleUndo = (fbKey, sale) => {

    remove(ref(db, `sold/${fbKey}`));

  const checkpoint = () => {

            {cp.msg}

            {/* Priority targets */}

                { rank:2, team:"Vanderbilt",    seed:5,  maxBid:300,  ev:370,  note:"KenPom #11, priced as 5-seed" },

                  <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                    <div style={{ fontSize:11,color:"#4b5563" }}>Pot projection: <span style={{ color:"#f59e0b",fontWeight:800 }}>${pot.toLocaleString()}</span></div>
                    <div style={{ fontSize:12,fontWeight:800,color:tempColor,background:"#0a0a14",padding:"3px 10px",borderRadius:5,border:`1px solid ${tempColor}33` }}>
                      {tempLabel} — {(temp*100).toFixed(0)}% of avg
                    </div>
                  </div>
                </div>
                {/* Per-seed temperature breakdown */}
                {Object.keys(
                  sold.reduce((acc,s) => { acc[s.team.seed]=true; return acc; }, {})
                ).sort((a,b)=>a-b).length > 1 && (
                  <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginBottom:12 }}>
                    {Object.entries(
                      sold.reduce((acc,s) => {
                        const h = SEED_HIST[s.team.seed];
                        if (!h) return acc;
                        if (!acc[s.team.seed]) acc[s.team.seed] = [];
                        acc[s.team.seed].push(s.price / h.avg);
                        return acc;
                      }, {})
                    ).sort((a,b)=>a[0]-b[0]).map(([seed, ratios]) => {
                      const r = ratios.reduce((a,b)=>a+b,0)/ratios.length;
                      const c = r > 1.12 ? "#ef4444" : r < 0.9 ? "#60a5fa" : "#94a3b8";
                      return (
                        <div key={seed} style={{ background:"#0a0a14",border:`1px solid ${c}44`,borderRadius:5,padding:"4px 8px",textAlign:"center" }}>
                          <div style={{ fontSize:9,color:"#374151" }}>SEED {seed}</div>
                          <div style={{ fontSize:12,fontWeight:800,color:c }}>{(r*100).toFixed(0)}%</div>
                        </div>
                      );
                    })}
                    <div style={{ alignSelf:"center",fontSize:10,color:"#374151",marginLeft:4 }}>of historical avg — updates all unsold price ranges</div>
                  </div>
                )}
                <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))",gap:6 }}>
                  {sold.map((s,i)=>{
                    const hist = SEED_HIST[s.team.seed];
                    const vsAvg = hist ? s.price - hist.avg : 0;
                    return (
                      <div key={i} style={{ background:"#070711",borderRadius:6,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                        <div>
                          <span style={{ fontSize:10,color:"#374151",marginRight:5 }}>S{s.team.seed}</span>
                          <span style={{ fontSize:13,fontWeight:700,color:"#e2e8f0" }}>{s.team.team}</span>
                          <div style={{ fontSize:10,color:"#374151" }}>{s.buyer}</div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:14,fontWeight:800,color:"#f59e0b" }}>${s.price}</div>
                          <div style={{ fontSize:9,color:vsAvg>0?"#ef4444":"#4ade80" }}>
                            {vsAvg>0?"+":""}${vsAvg} vs avg
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}


    // Wait for Firebase to load before mounting
    function mount() {
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    }

    if (window._firebaseReady) {
      mount();
    } else {
      document.addEventListener("firebase-ready", mount);
    }
  </script>
</body>
</html>
